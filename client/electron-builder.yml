appId: com.agentcrewchat.desktop
productName: AgentCrewChat
copyright: Copyright © 2026 AgentCrewChat

directories:
  output: release

files:
  - dist/**/*
  - electron/**/*
  - package.json

extraResources:
  - from: resources/python
    to: python
    filter:
      - "**/*"
  - from: resources/backend
    to: backend
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/favicon.svg

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/favicon.svg
  uninstallerIcon: public/favicon.svg
  installerHeaderIcon: public/favicon.svg
